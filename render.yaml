services:
  - type: web
    name: web-to-apk-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: REPO
        value: codingwithnovatech-del/web-to-apk
      - key: ADMIN_PASSWORD
        sync: false
      - key: API_URL
        value: https://web-to-apk-backend.onrender.com
