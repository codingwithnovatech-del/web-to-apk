<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Blacklist - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-brand">📱 WebAPK</div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="builds.html" class="nav-item">📋 Builds</a>
        <a href="users.html" class="nav-item">👥 Users</a>
        <a href="api-keys.html" class="nav-item">🔑 API Keys</a>
        <a href="settings.html" class="nav-item">⚙️ Settings</a>
        <a href="analytics.html" class="nav-item">📈 Analytics</a>
        <a href="logs.html" class="nav-item">📝 Logs</a>
        <a href="ip-blacklist.html" class="nav-item active">🚫 IP Blacklist</a>
        <a href="backup.html" class="nav-item">💾 Backup</a>
      </div>
      <div class="sidebar-footer">
        <span id="userName">Admin</span>
        <button onclick="adminLogout()" class="logout-btn">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>🚫 IP Blacklist</h1>
        <button onclick="showAddIpModal()" class="btn-sm">+ Add IP</button>
      </header>

      <div class="card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>IP Address</th>
                <th>Reason</th>
                <th>Date Added</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="blacklistTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="addIpModal" class="modal hidden">
    <div class="modal-content">
      <h2>Blacklist IP</h2>
      <div class="form-group"><label>IP Address</label><input type="text" id="blacklistIp" placeholder="192.168.1.1"></div>
      <div class="form-group"><label>Reason</label><input type="text" id="blacklistReason" placeholder="Spam / Abuse"></div>
      <div class="btn-group">
        <button onclick="addToBlacklist()">Add</button>
        <button onclick="closeModal('addIpModal')" class="btn-sm">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>loadBlacklist();</script>
</body>
</html>
