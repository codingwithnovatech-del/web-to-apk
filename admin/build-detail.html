<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Detail - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-brand">📱 WebAPK</div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="builds.html" class="nav-item active">📋 Builds</a>
        <a href="users.html" class="nav-item">👥 Users</a>
        <a href="api-keys.html" class="nav-item">🔑 API Keys</a>
        <a href="settings.html" class="nav-item">⚙️ Settings</a>
        <a href="analytics.html" class="nav-item">📈 Analytics</a>
        <a href="logs.html" class="nav-item">📝 Logs</a>
        <a href="ip-blacklist.html" class="nav-item">🚫 IP Blacklist</a>
        <a href="backup.html" class="nav-item">💾 Backup</a>
      </div>
      <div class="sidebar-footer">
        <span id="userName">Admin</span>
        <button onclick="adminLogout()" class="logout-btn">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <a href="builds.html" class="back-link">← Back to Builds</a>
        <h1>Build Detail</h1>
      </header>

      <div class="card" id="buildDetail">
        <p class="text-muted">Loading...</p>
      </div>

      <div class="card">
        <h2>Build Logs</h2>
        <pre id="buildLogs" class="log-viewer">No logs available</pre>
      </div>

      <div class="card">
        <h2>Actions</h2>
        <div class="btn-group">
          <button onclick="rebuildBuild()" class="btn-sm">🔄 Rebuild</button>
          <button onclick="deleteBuild()" class="btn-sm danger">🗑 Delete</button>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>loadBuildDetail();</script>
</body>
</html>
