<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-brand">📱 WebAPK</div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="builds.html" class="nav-item">📋 Builds</a>
        <a href="users.html" class="nav-item">👥 Users</a>
        <a href="api-keys.html" class="nav-item">🔑 API Keys</a>
        <a href="settings.html" class="nav-item">⚙️ Settings</a>
        <a href="analytics.html" class="nav-item">📈 Analytics</a>
        <a href="logs.html" class="nav-item active">📝 Logs</a>
        <a href="ip-blacklist.html" class="nav-item">🚫 IP Blacklist</a>
        <a href="backup.html" class="nav-item">💾 Backup</a>
      </div>
      <div class="sidebar-footer">
        <span id="userName">Admin</span>
        <button onclick="adminLogout()" class="logout-btn">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>📝 Audit Logs</h1>
        <button onclick="clearLogs()" class="btn-sm danger">🗑 Clear All Logs</button>
      </header>

      <div class="card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>User ID</th>
                <th>Action</th>
                <th>Details</th>
                <th>IP</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="logsTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="logsPagination"></div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>loadLogs();</script>
</body>
</html>
