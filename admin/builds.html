<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builds - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-brand">📱 WebAPK</div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="builds.html" class="nav-item active">📋 Builds</a>
        <a href="users.html" class="nav-item">👥 Users</a>
        <a href="api-keys.html" class="nav-item">🔑 API Keys</a>
        <a href="settings.html" class="nav-item">⚙️ Settings</a>
        <a href="analytics.html" class="nav-item">📈 Analytics</a>
        <a href="logs.html" class="nav-item">📝 Logs</a>
        <a href="ip-blacklist.html" class="nav-item">🚫 IP Blacklist</a>
        <a href="backup.html" class="nav-item">💾 Backup</a>
      </div>
      <div class="sidebar-footer">
        <span id="userName">Admin</span>
        <button onclick="adminLogout()" class="logout-btn">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>📋 Builds</h1>
        <div class="header-actions">
          <button onclick="exportBuilds()" class="btn-sm">📥 Export CSV</button>
          <button onclick="batchDelete()" class="btn-sm danger">🗑 Batch Delete</button>
        </div>
      </header>

      <div class="card">
        <div class="table-toolbar">
          <input type="text" id="searchInput" placeholder="Search builds..." oninput="filterBuilds()">
          <select id="statusFilter" onchange="filterBuilds()">
            <option value="">All Status</option>
            <option value="queued">Queued</option>
            <option value="building">Building</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
          <select id="sortSelect" onchange="filterBuilds()">
            <option value="created_at">Newest</option>
            <option value="created_at|asc">Oldest</option>
            <option value="app_name">App Name</option>
          </select>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th><input type="checkbox" id="selectAll" onchange="toggleAll()"></th>
                <th>ID</th>
                <th>URL</th>
                <th>App Name</th>
                <th>Status</th>
                <th>Date</th>
                <th>Duration</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="buildsTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>loadBuilds();</script>
</body>
</html>
