<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-brand">📱 WebAPK</div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="builds.html" class="nav-item">📋 Builds</a>
        <a href="users.html" class="nav-item">👥 Users</a>
        <a href="api-keys.html" class="nav-item">🔑 API Keys</a>
        <a href="settings.html" class="nav-item active">⚙️ Settings</a>
        <a href="analytics.html" class="nav-item">📈 Analytics</a>
        <a href="logs.html" class="nav-item">📝 Logs</a>
        <a href="ip-blacklist.html" class="nav-item">🚫 IP Blacklist</a>
        <a href="backup.html" class="nav-item">💾 Backup</a>
      </div>
      <div class="sidebar-footer">
        <span id="userName">Admin</span>
        <button onclick="adminLogout()" class="logout-btn">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>⚙️ Settings</h1>
      </header>

      <div class="card">
        <h2>General Settings</h2>
        <div id="settingsForm">
          <div class="form-group">
            <label>Build Timeout (minutes)</label>
            <input type="number" id="set_build_timeout" value="10">
          </div>
          <div class="form-group">
            <label>Max Builds Per Day (per user)</label>
            <input type="number" id="set_max_builds_per_day" value="10">
          </div>
          <div class="form-group">
            <label>Max App Name Length</label>
            <input type="number" id="set_max_app_name_length" value="50">
          </div>
          <div class="form-group">
            <label>Allowed Domains (comma-separated, empty = all)</label>
            <input type="text" id="set_allowed_domains" placeholder="example.com, mydomain.com">
          </div>
          <div class="form-group">
            <label>Blocked Domains (comma-separated)</label>
            <input type="text" id="set_blocked_domains" placeholder="illegal-site.com">
          </div>
          <div class="form-group">
            <label>Maintenance Mode</label>
            <select id="set_maintenance_mode">
              <option value="false">Disabled</option>
              <option value="true">Enabled</option>
            </select>
          </div>
          <button onclick="saveSettings()">💾 Save Settings</button>
        </div>
      </div>

      <div class="card">
        <h2>Change Password</h2>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPasswordInput" placeholder="Min 6 characters">
        </div>
        <button onclick="changePassword()">🔑 Change Password</button>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>loadSettings();</script>
</body>
</html>
