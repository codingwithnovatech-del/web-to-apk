name: Build APK
on:
  workflow_dispatch:
    inputs:
      url:
        description: "Website URL"
        required: true
      app_name:
        description: "App Name"
        required: true
      build_id:
        description: "Build ID"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          cd /tmp
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          SAFE_NAME=$(echo -n "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
          npx cap init "${{ inputs.app_name }}" "com.webapk.${SAFE_NAME}" --web-dir www --skip-appid-validation
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Loading</title><style>*{margin:0;padding:0}body{background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#555}</style></head><body><div><h2>Loading ${{ inputs.app_name }}...</h2></div></body></html>' > www/index.html
          printf '{"appId":"com.webapk.%s","appName":"%s","webDir":"www","server":{"url":"%s","allowNavigation":["*"],"cleartext":true},"android":{"allowMixedContent":true,"webContentsDebuggingEnabled":false}}' "$SAFE_NAME" "${{ inputs.app_name }}" "${{ inputs.url }}" > capacitor.config.json
          npx cap add android

      - name: Customize Android Project
        run: |
          chmod +x scripts/customize-android.sh
          SAFE_NAME=$(echo -n "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
          ./scripts/customize-android.sh /tmp/android "com.webapk.${SAFE_NAME}" "${{ inputs.app_name }}" "${{ inputs.url }}"

      - name: Configure Gradle
        run: |
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22' } }" > /tmp/build_header.tmp
          cat /tmp/android/app/build.gradle >> /tmp/build_header.tmp
          mv /tmp/build_header.tmp /tmp/android/app/build.gradle

      - name: Build APK
        run: |
          cd /tmp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp /tmp/android/app/build/outputs/apk/debug/app-debug.apk /tmp/app.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ inputs.build_id }}
          name: ${{ inputs.app_name }}
          body: "APK for ${{ inputs.app_name }} - ${{ inputs.url }}"
          files: /tmp/app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Status JSON
        run: |
          mkdir -p docs/builds
          echo "{\"status\":\"completed\",\"app_name\":\"${{ inputs.app_name }}\",\"build_id\":\"${{ inputs.build_id }}\",\"download_url\":\"https://github.com/${{ github.repository }}/releases/tag/build-${{ inputs.build_id }}\"}" > docs/builds/${{ inputs.build_id }}.json

      - name: Commit Status
        run: |
          git config user.name "APK Builder"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add docs/builds/${{ inputs.build_id }}.json
          git commit -m "build status: ${{ inputs.build_id }}" || true
          git pull --rebase origin main || true
          git push
