name: Build APK
on:
  workflow_dispatch:
    inputs:
      url:
        description: "Website URL"
        required: true
      app_name:
        description: "App Name"
        required: true
      build_id:
        description: "Build ID"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          cd /tmp
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          SAFE_NAME=$(echo -n "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
          npx cap init "${{ inputs.app_name }}" "com.webapk.${SAFE_NAME}" --web-dir www --skip-appid-validation
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>${{ inputs.app_name }}</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#000}iframe{width:100%;height:100%;border:none}</style></head><body><iframe src="${{ inputs.url }}" allow="geolocation;camera;microphone"></iframe></body></html>' > www/index.html
          npx cap add android

      - name: Configure Gradle
        run: |
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22' } }" > /tmp/build_header.tmp
          cat /tmp/android/app/build.gradle >> /tmp/build_header.tmp
          mv /tmp/build_header.tmp /tmp/android/app/build.gradle

      - name: Build APK
        run: |
          cd /tmp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp /tmp/android/app/build/outputs/apk/debug/app-debug.apk /tmp/app.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ inputs.build_id }}
          name: ${{ inputs.app_name }}
          body: "APK for ${{ inputs.app_name }} - ${{ inputs.url }}"
          files: /tmp/app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Status JSON
        run: |
          mkdir -p docs/builds
          echo "{\"status\":\"completed\",\"app_name\":\"${{ inputs.app_name }}\",\"build_id\":\"${{ inputs.build_id }}\",\"download_url\":\"https://github.com/${{ github.repository }}/releases/tag/build-${{ inputs.build_id }}\"}" > docs/builds/${{ inputs.build_id }}.json

      - name: Commit Status
        run: |
          git config user.name "APK Builder"
          git config user.email "actions@github.com"
          git add docs/builds/${{ inputs.build_id }}.json
          git commit -m "build status: ${{ inputs.build_id }}" || true
          git push
