name: Build APK
on:
  workflow_dispatch:
    inputs:
      url:
        description: Website URL
        required: true
      app_name:
        description: App Name
        required: true
      build_id:
        description: Build ID
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "URL=${{ inputs.url }} Name=${{ inputs.app_name }} ID=${{ inputs.build_id }}"
