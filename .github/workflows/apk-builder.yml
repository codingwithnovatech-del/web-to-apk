name: Build APK
on:
  workflow_dispatch:
    inputs:
      url:
        description: Website URL
        required: true
      app_name:
        description: App Name
        required: true
      build_id:
        description: Build ID
        required: true
      package_name:
        description: Package Name
        required: false
        default: ""
      app_version:
        description: App Version
        required: false
        default: "1.0.0"
      icon_url:
        description: App Icon URL
        required: false
        default: ""
      keystore_b64:
        description: Keystore Base64
        required: false
        default: ""
      keystore_pass:
        description: Keystore Password
        required: false
        default: ""
      key_alias:
        description: Key Alias
        required: false
        default: ""
      key_pass:
        description: Key Password
        required: false
        default: ""
      orientation:
        description: Screen Orientation
        required: false
        default: "default"
      firebase_config_b64:
        description: Firebase Config
        required: false
        default: ""
      fcm_api_key:
        description: FCM Server Key
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Create Project
        run: |
          cd /tmp
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          SAFE_NAME=$(echo -n "${{ inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
          PKG_NAME="${{ inputs.package_name }}"
          if [ -z "$PKG_NAME" ]; then
            PKG_NAME="com.webapk.${SAFE_NAME}"
          fi
          npx cap init "${{ inputs.app_name }}" "$PKG_NAME" --web-dir www --skip-appid-validation
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${{ inputs.app_name }}</title><style>*{margin:0;padding:0}body{background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#555}</style></head><body><div><h2>Loading ${{ inputs.app_name }}...</h2></div></body></html>' > www/index.html
          printf '{"appId":"%s","appName":"%s","versionName":"%s","versionCode":1,"webDir":"www","server":{"url":"%s","allowNavigation":["*"],"cleartext":true},"android":{"allowMixedContent":true,"webContentsDebuggingEnabled":false}}' "$PKG_NAME" "${{ inputs.app_name }}" "${{ inputs.app_version }}" "${{ inputs.url }}" > capacitor.config.json
          npx cap add android
          echo "PKG_NAME=$PKG_NAME" >> $GITHUB_ENV
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
      - name: Setup Firebase Config
        if: inputs.firebase_config_b64 != ''
        run: |
          echo "${{ inputs.firebase_config_b64 }}" | base64 -d > /tmp/firebase_raw.json
          sed -i 's|"package_name": "[^"]*"|"package_name": "${{ env.PKG_NAME }}"|' /tmp/firebase_raw.json
          cp /tmp/firebase_raw.json /tmp/android/app/google-services.json
          sed -i '1s|^|buildscript { dependencies { classpath "com.google.gms:google-services:4.4.0" } }\n|' /tmp/android/build.gradle
          sed -i '1s|^|apply plugin: "com.google.gms.google-services"\n|' /tmp/android/app/build.gradle
      - name: Customize Android Project
        run: |
          chmod +x scripts/customize-android.sh
          ./scripts/customize-android.sh /tmp/android "${{ env.PKG_NAME }}" "${{ inputs.app_name }}" "${{ inputs.url }}" "${{ inputs.orientation }}"
