name: Build APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Website URL to convert"
        required: true
      app_name:
        description: "Android App Name"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Capacitor Project
        run: |
          cd /tmp
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          APP_NAME="${{ inputs.app_name }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-')
          npx cap init "$APP_NAME" "com.webapk.$SAFE_NAME" --web-dir www
          mkdir -p www
          cat > www/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>__APP_NAME__</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    iframe{width:100%;height:100%;border:none}
  </style>
</head>
<body>
  <iframe src="__URL__" allow="geolocation;camera;microphone"></iframe>
</body>
</html>
HTMLEOF
          sed -i "s|__APP_NAME__|$APP_NAME|g" www/index.html
          sed -i "s|__URL__|${{ inputs.url }}|g" www/index.html
          cat > capacitor.config.json << 'JSONEOF'
{
  "appId": "com.webapk.$SAFE_NAME",
  "appName": "$APP_NAME",
  "webDir": "www",
  "server": {
    "url": "${{ inputs.url }}",
    "allowNavigation": ["*"],
    "cleartext": true
  },
  "android": {
    "allowMixedContent": true,
    "webContentsDebuggingEnabled": false
  },
  "plugins": {
    "SplashScreen": {
      "launchShowDuration": 2000,
      "launchAutoHide": true,
      "backgroundColor": "#ffffff"
    }
  }
}
JSONEOF
          npx cap add android

      - name: Configure Android Manifest
        run: |
          cd /tmp/android
          MANIFEST="app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/><application android:usesCleartextTraffic="true"|' "$MANIFEST"

      - name: Build Debug APK
        run: |
          cd /tmp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp /tmp/android/app/build/outputs/apk/debug/app-debug.apk /tmp/app.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}.apk
          path: /tmp/app.apk
          retention-days: 7
