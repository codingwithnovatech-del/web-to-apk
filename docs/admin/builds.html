<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builds - WebToAPK Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-header">WebToAPK</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="builds.html" class="active">Builds</a>
    <a href="users.html">Users</a>
    <a href="settings.html">Settings</a>
    <a href="payments.html">Payments</a>
    <a href="store.html">App Store</a>
    <a href="javascript:adminLogout()" class="logout-link">Logout</a>
  </nav>
  <main class="main-content">
    <div class="page-header"><h1>Builds</h1></div>
    <div class="card">
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <input type="text" id="searchInput" placeholder="Search..." oninput="filterBuilds()">
        <select id="statusFilter" onchange="filterBuilds()"><option value="">All Status</option><option value="completed">Completed</option><option value="failed">Failed</option></select>
        <button class="btn-sm danger" onclick="batchDelete()">Delete Selected</button>
      </div>
      <div style="overflow-x:auto">
        <table><thead><tr><th><input type="checkbox" id="selectAll" onchange="toggleAll()"></th><th>ID</th><th>URL</th><th>App Name</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody id="buildsTableBody"></tbody></table>
      </div>
      <div id="pagination" style="display:flex;gap:8px;margin-top:16px;justify-content:center"></div>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
