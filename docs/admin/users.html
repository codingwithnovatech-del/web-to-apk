<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-header">⚙️ Admin</div>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="builds.html">📦 Builds</a>
      <a href="users.html" class="active">👥 Users</a>
      <a href="notifications.html">🔔 Notifications</a>
      <a href="api-keys.html">🔑 API Keys</a>
      <a href="analytics.html">📈 Analytics</a>
      <a href="ip-blacklist.html">🚫 IP Blacklist</a>
      <a href="logs.html">📋 Logs</a>
      <a href="backup.html">💾 Backup</a>
      <a href="settings.html">⚙️ Settings</a>
      <div class="sidebar-footer">
        <a href="../" style="color:#888">← Main Site</a>
        <a href="#" onclick="adminLogout()" style="color:#e94560">Logout</a>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>👥 Users</h1>
        <button onclick="showAddUserModal()" class="btn-sm">+ Add User</button>
      </header>

      <div class="card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Active</th>
                <th>Rate Limit</th>
                <th>Last Login</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="addUserModal" class="modal hidden">
    <div class="modal-content">
      <h2>Add User</h2>
      <div class="form-group"><label>Username</label><input type="text" id="newUsername"></div>
      <div class="form-group"><label>Email</label><input type="email" id="newEmail"></div>
      <div class="form-group"><label>Password</label><input type="password" id="newPassword"></div>
      <div class="form-group">
        <label>Role</label>
        <select id="newRole"><option value="admin">Admin</option><option value="superadmin">Superadmin</option></select>
      </div>
      <div class="form-group"><label>Rate Limit (per day)</label><input type="number" id="newRateLimit" value="10"></div>
      <div class="btn-group">
        <button onclick="createUser()">Create</button>
        <button onclick="closeModal('addUserModal')" class="btn-sm">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const USERS_KEY = "webapk_users";

    function getUsers() {
      const d = localStorage.getItem(USERS_KEY);
      if (d) return JSON.parse(d);
      const defaults = [
        { id: 1, username: "admin", email: "admin@webtoapk.com", password: "admin123", role: "superadmin", active: true, rateLimit: 100, lastLogin: new Date().toISOString() }
      ];
      localStorage.setItem(USERS_KEY, JSON.stringify(defaults));
      return defaults;
    }

    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    function loadUsers() {
      const users = getUsers();
      const tbody = document.getElementById("usersTableBody");
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username}</td>
          <td>${u.email}</td>
          <td><span class="badge ${u.role === 'superadmin' ? 'badge-danger' : 'badge-primary'}">${u.role}</span></td>
          <td>${u.active ? '✅' : '❌'}</td>
          <td>${u.rateLimit}/day</td>
          <td>${new Date(u.lastLogin).toLocaleDateString()}</td>
          <td class="action-cell">
            <button class="btn-icon" onclick="toggleUser(${u.id})" title="${u.active ? 'Disable' : 'Enable'}">${u.active ? '🔒' : '🔓'}</button>
            <button class="btn-icon" onclick="deleteUser(${u.id})" title="Delete">🗑️</button>
          </td>
        </tr>
      `).join("");
    }

    function showAddUserModal() {
      document.getElementById("addUserModal").classList.remove("hidden");
    }

    function closeModal(id) {
      document.getElementById(id).classList.add("hidden");
    }

    function createUser() {
      const users = getUsers();
      const username = document.getElementById("newUsername").value.trim();
      const email = document.getElementById("newEmail").value.trim();
      const password = document.getElementById("newPassword").value.trim();
      const role = document.getElementById("newRole").value;
      const rateLimit = parseInt(document.getElementById("newRateLimit").value) || 10;
      if (!username || !email || !password) { alert("Fill all fields"); return; }
      if (users.find(u => u.username === username)) { alert("Username exists"); return; }
      users.push({ id: Date.now(), username, email, password, role, active: true, rateLimit, lastLogin: "" });
      saveUsers(users);
      loadUsers();
      closeModal("addUserModal");
      document.getElementById("newUsername").value = "";
      document.getElementById("newEmail").value = "";
      document.getElementById("newPassword").value = "";
    }

    function toggleUser(id) {
      const users = getUsers();
      const u = users.find(x => x.id === id);
      if (u) { u.active = !u.active; saveUsers(users); loadUsers(); }
    }

    function deleteUser(id) {
      if (!confirm("Delete this user?")) return;
      let users = getUsers();
      users = users.filter(u => u.id !== id);
      saveUsers(users);
      loadUsers();
    }
  </script>
</body>
</html>
