<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-header">⚙️ Admin</div>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="builds.html">📦 Builds</a>
      <a href="users.html">👥 Users</a>
      <a href="notifications.html">🔔 Notifications</a>
      <a href="api-keys.html">🔑 API Keys</a>
      <a href="analytics.html">📈 Analytics</a>
      <a href="ip-blacklist.html">🚫 IP Blacklist</a>
      <a href="logs.html" class="active">📋 Logs</a>
      <a href="backup.html">💾 Backup</a>
      <a href="settings.html">⚙️ Settings</a>
      <div class="sidebar-footer">
        <a href="../" style="color:#888">← Main Site</a>
        <a href="#" onclick="adminLogout()" style="color:#e94560">Logout</a>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>📝 Audit Logs</h1>
        <button onclick="clearLogs()" class="btn-sm danger">🗑 Clear All Logs</button>
      </header>

      <div class="card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>User ID</th>
                <th>Action</th>
                <th>Details</th>
                <th>IP</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="logsTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="logsPagination"></div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>loadLogs();</script>
</body>
</html>
