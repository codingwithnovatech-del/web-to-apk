<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - WebToAPK Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-header">WebToAPK</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="builds.html">Builds</a>
    <a href="users.html">Users</a>
    <a href="settings.html" class="active">Settings</a>
    <a href="payments.html">Payments</a>
    <a href="store.html">App Store</a>
    <a href="javascript:adminLogout()" class="logout-link">Logout</a>
  </nav>
  <main class="main-content">
    <div class="page-header"><h1>Settings</h1></div>
    <form id="settingsForm" onsubmit="saveSettings();return false">
    <div class="card">
      <h2>GitHub Token</h2>
      <div class="form-group"><label>GitHub Personal Access Token</label><input type="password" id="set_github_token" placeholder="ghp_... or github_pat_..."></div>
      <p style="font-size:11px;color:#888;margin-top:-12px;margin-bottom:16px">Token is stored in Firestore. Users don't need to log in.</p>
    </div>
    <div class="card">
      <h2>Build Limits</h2>
      <div class="form-group"><label>Daily Free Limit</label><input type="number" id="set_daily_limit" value="3"></div>
      <div class="form-group"><label>Branding</label><select id="set_branding_enabled"><option value="true">Enabled (show Powered by WebToAPK)</option><option value="false">Disabled</option></select></div>
    </div>
    <div class="card">
      <h2>Payment</h2>
      <div class="form-group"><label>UPI ID</label><input type="text" id="set_upi_id" placeholder="e.g. @tsayush"></div>
      <div class="form-group"><label>UPI QR Image URL</label><input type="text" id="set_upi_qr_url" placeholder="https://example.com/qr.png"></div>
      <div class="form-group"><label>Free Tier Price (₹)</label><input type="number" id="set_free_price" value="99"></div>
      <div class="form-group"><label>Paid Tier Price (₹)</label><input type="number" id="set_paid_price" value="499"></div>
    </div>
    <div class="card">
      <h2>AdSense</h2>
      <div class="form-group"><label>AdSense Publisher ID</label><input type="text" id="set_adsense_id" placeholder="pub-xxxxxxxxxxxxxx"></div>
    </div>
    <div class="card">
      <h2>Affiliate</h2>
      <div class="form-group"><label>Hostinger Affiliate Link</label><input type="text" id="set_affiliate_link" placeholder="https://hostinger.com/ref/..."></div>
      <div class="form-group"><label>Namecheap Affiliate Link</label><input type="text" id="set_namecheap_link" placeholder="https://namecheap.com/ref/..."></div>
    </div>
    <button type="submit" class="btn-primary">Save Settings</button>
    </form>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
