<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-header">⚙️ Admin</div>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="builds.html">📦 Builds</a>
      <a href="users.html">👥 Users</a>
      <a href="notifications.html">🔔 Notifications</a>
      <a href="api-keys.html">🔑 API Keys</a>
      <a href="analytics.html">📈 Analytics</a>
      <a href="ip-blacklist.html">🚫 IP Blacklist</a>
      <a href="logs.html">📋 Logs</a>
      <a href="backup.html">💾 Backup</a>
      <a href="settings.html" class="active">⚙️ Settings</a>
      <div class="sidebar-footer">
        <a href="../" style="color:#888">← Main Site</a>
        <a href="#" onclick="adminLogout()" style="color:#e94560">Logout</a>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>⚙️ Settings</h1>
      </header>

      <div class="card">
        <h2>General Settings</h2>
        <div id="settingsForm">
          <div class="form-group">
            <label>Build Timeout (minutes)</label>
            <input type="number" id="set_build_timeout" value="10">
          </div>
          <div class="form-group">
            <label>Max Builds Per Day (per user)</label>
            <input type="number" id="set_max_builds_per_day" value="10">
          </div>
          <div class="form-group">
            <label>Max App Name Length</label>
            <input type="number" id="set_max_app_name_length" value="50">
          </div>
          <div class="form-group">
            <label>Allowed Domains (comma-separated, empty = all)</label>
            <input type="text" id="set_allowed_domains" placeholder="example.com, mydomain.com">
          </div>
          <div class="form-group">
            <label>Blocked Domains (comma-separated)</label>
            <input type="text" id="set_blocked_domains" placeholder="illegal-site.com">
          </div>
          <div class="form-group">
            <label>Maintenance Mode</label>
            <select id="set_maintenance_mode">
              <option value="false">Disabled</option>
              <option value="true">Enabled</option>
            </select>
          </div>
          <button onclick="saveSettings()">💾 Save Settings</button>
        </div>
      </div>

      <div class="card">
        <h2>🔔 Firebase Push Notifications</h2>
        <div class="form-group">
          <label>FCM Server Key</label>
          <input type="password" id="set_fcm_key" placeholder="AAAA...">
          <p class="hint">From Firebase Console → Project Settings → Cloud Messaging → Server Key</p>
        </div>
        <button onclick="saveFirebaseKey()">💾 Save Firebase Key</button>
      </div>

      <div class="card">
        <h2>Change Password</h2>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPasswordInput" placeholder="Min 6 characters">
        </div>
        <button onclick="changePassword()">🔑 Change Password</button>
      </div>
    </main>
    <script>
      function saveFirebaseKey() {
        const key = document.getElementById("set_fcm_key").value.trim();
        if (!key) { alert("Enter your FCM Server Key"); return; }
        localStorage.setItem("fcm_server_key", key);
        alert("✅ Firebase key saved!");
      }
      // Load saved key
      document.addEventListener("DOMContentLoaded", function() {
        const saved = localStorage.getItem("fcm_server_key") || "";
        document.getElementById("set_fcm_key").value = saved;
      });
    </script>
  </div>
  <script src="app.js"></script>
  <script>loadSettings();</script>
</body>
</html>
