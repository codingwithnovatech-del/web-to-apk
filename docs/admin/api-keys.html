<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Keys - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-brand">📱 WebAPK</div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="builds.html" class="nav-item">📋 Builds</a>
        <a href="users.html" class="nav-item">👥 Users</a>
        <a href="api-keys.html" class="nav-item active">🔑 API Keys</a>
        <a href="settings.html" class="nav-item">⚙️ Settings</a>
        <a href="analytics.html" class="nav-item">📈 Analytics</a>
        <a href="logs.html" class="nav-item">📝 Logs</a>
        <a href="ip-blacklist.html" class="nav-item">🚫 IP Blacklist</a>
        <a href="backup.html" class="nav-item">💾 Backup</a>
      </div>
      <div class="sidebar-footer">
        <span id="userName">Admin</span>
        <button onclick="adminLogout()" class="logout-btn">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <h1>🔑 API Keys</h1>
        <button onclick="showAddKeyModal()" class="btn-sm">+ Generate Key</button>
      </header>

      <div class="card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Key</th>
                <th>Permissions</th>
                <th>Active</th>
                <th>Usage</th>
                <th>Owner</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="keysTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="addKeyModal" class="modal hidden">
    <div class="modal-content">
      <h2>Generate API Key</h2>
      <div class="form-group"><label>Name</label><input type="text" id="keyName" placeholder="My App Key"></div>
      <div class="form-group">
        <label>Permissions</label>
        <select id="keyPermissions">
          <option value="read">Read Only</option>
          <option value="write">Read & Write</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="btn-group">
        <button onclick="createApiKey()">Generate</button>
        <button onclick="closeModal('addKeyModal')" class="btn-sm">Cancel</button>
      </div>
    </div>
  </div>

  <div id="keyResultModal" class="modal hidden">
    <div class="modal-content">
      <h2>Key Generated</h2>
      <p>Copy this key now. You won't see it again!</p>
      <pre id="keyResult" style="background:#1a1a2e;padding:12px;border-radius:8px;word-break:break-all;"></pre>
      <button onclick="copyKey()" class="btn-sm">📋 Copy</button>
      <button onclick="closeModal('keyResultModal')" class="btn-sm">Done</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>loadApiKeys();</script>
</body>
</html>
