<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - WebToAPK Admin</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-header">WebToAPK</div>
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="builds.html">Builds</a>
    <a href="users.html">Users</a>
    <a href="settings.html">Settings</a>
    <a href="payments.html">Payments</a>
    <a href="store.html">App Store</a>
    <a href="javascript:adminLogout()" class="logout-link">Logout</a>
  </nav>
  <main class="main-content">
    <div class="page-header">
      <h1>Dashboard</h1>
      <span id="userName" style="color:#888"></span>
    </div>
    <div class="stats-grid" id="statsGrid">
      <div class="card"><h3>Total Builds</h3><p id="statTotal">-</p></div>
      <div class="card"><h3>Successful</h3><p id="statSuccess">-</p></div>
      <div class="card"><h3>Today</h3><p id="statToday">-</p></div>
      <div class="card"><h3>Users</h3><p id="statUsers">-</p></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2>Builds Chart</h2>
        <div class="btn-group" id="chartBtns">
          <button class="btn-sm active" onclick="loadChart(7)">7D</button>
          <button class="btn-sm" onclick="loadChart(30)">30D</button>
          <button class="btn-sm" onclick="loadChart(90)">90D</button>
        </div>
      </div>
      <div style="height:250px"><canvas id="chartCanvas"></canvas></div>
    </div>
    <div class="card">
      <h2>Recent Builds</h2>
      <div id="recentBuilds"><p class="text-muted">No builds yet</p></div>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
