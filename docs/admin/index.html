<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Website to APK</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-tabs { display:flex; gap:0; margin-bottom:20px; }
    .login-tabs button { flex:1; padding:10px; background:transparent; border:1px solid #2a2a3e; color:#888; cursor:pointer; border-radius:0; font-size:0.9rem; }
    .login-tabs button:first-child { border-radius:8px 0 0 8px; }
    .login-tabs button:last-child { border-radius:0 8px 8px 0; }
    .login-tabs button.active { background:#e94560; border-color:#e94560; color:#fff; }
    .setup-link { text-align:center; margin-top:12px; font-size:0.8rem; }
    .setup-link a { color:#e94560; text-decoration:none; }
    .setup-link a:hover { text-decoration:underline; }
  </style>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">🔐</div>
      <h1>Admin Login</h1>
      <p class="login-subtitle">Website to APK Converter</p>
      <div id="loginError" class="alert alert-error hidden"></div>
      <div class="login-tabs">
        <button id="localTab" class="active" onclick="switchTab('local')">Local</button>
        <button id="firebaseTab" onclick="switchTab('firebase')">Firebase</button>
      </div>

      <!-- Local Login -->
      <div id="localLogin">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button onclick="adminLogin()">Sign In</button>
      </div>

      <!-- Firebase Login -->
      <div id="firebaseLogin" style="display:none">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="emailInput" placeholder="admin@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="pass">Password</label>
          <input type="password" id="passInput" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button onclick="firebaseLogin()">Sign In with Firebase</button>
        <div class="setup-link">
          <a href="#" onclick="document.getElementById('firebaseSetup').style.display='block'">Need Firebase setup? ⚙️</a>
        </div>
        <div id="firebaseSetup" style="display:none;margin-top:16px;padding:12px;background:#0a0a1a;border-radius:8px;font-size:0.8rem;color:#aaa">
          <p style="margin-bottom:8px"><strong>Firebase Setup:</strong></p>
          <ol style="margin-left:16px">
            <li>Go to <a href="https://console.firebase.google.com" target="_blank" style="color:#e94560">Firebase Console</a></li>
            <li>Create project → Add Web App</li>
            <li>Copy the <code>firebaseConfig</code> object</li>
            <li>Go to <a href="settings.html" style="color:#e94560">Settings</a> → Firebase Config</li>
            <li>Enable <strong>Authentication → Sign-in method → Email/Password</strong></li>
          </ol>
        </div>
      </div>

      <p style="text-align:center;margin-top:16px"><a href="../" style="color:#e94560;text-decoration:none;font-size:0.85rem">← Back to Site</a></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (localStorage.getItem("admin_token") || localStorage.getItem("firebase_token")) {
      window.location.href = "dashboard.html";
    }

    function switchTab(tab) {
      document.getElementById("localTab").classList.toggle("active", tab === "local");
      document.getElementById("firebaseTab").classList.toggle("active", tab === "firebase");
      document.getElementById("localLogin").style.display = tab === "local" ? "block" : "none";
      document.getElementById("firebaseLogin").style.display = tab === "firebase" ? "block" : "none";
    }

    function firebaseLogin() {
      const email = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passInput").value.trim();
      if (!email || !password) { showLoginError("Fill all fields"); return; }

      const firebaseConfig = JSON.parse(localStorage.getItem("firebase_config") || "null");
      if (!firebaseConfig) {
        showLoginError("Firebase not configured. Go to Settings → Firebase Config.");
        return;
      }

      import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js").then(() => {
        import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js").then(() => {
          if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
          firebase.auth().signInWithEmailAndPassword(email, password)
            .then(userCred => {
              return userCred.user.getIdToken();
            })
            .then(token => {
              localStorage.setItem("firebase_token", token);
              localStorage.setItem("admin_user", JSON.stringify({ email }));
              window.location.href = "dashboard.html";
            })
            .catch(err => showLoginError(err.message));
        });
      }).catch(() => {
        showLoginError("Failed to load Firebase SDK. Check internet.");
      });
    }
  </script>
</body>
</html>
