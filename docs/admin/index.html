<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - WebToAPK</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">&#9881;</div>
      <h1>Admin Login</h1>
      <p class="login-subtitle">WebToAPK Converter</p>
      <p style="font-size:12px;color:#888;margin-bottom:16px">Demo: admin@webtoapk.app / admin123</p>
      <div id="loginError" class="alert alert-error hidden"></div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" value="admin@webtoapk.app">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" value="admin123">
      </div>
      <button class="btn-primary" onclick="adminLogin()">Sign In</button>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
