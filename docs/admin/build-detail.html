<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Detail - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-header">⚙️ Admin</div>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="builds.html" class="active">📦 Builds</a>
      <a href="users.html">👥 Users</a>
      <a href="notifications.html">🔔 Notifications</a>
      <a href="api-keys.html">🔑 API Keys</a>
      <a href="analytics.html">📈 Analytics</a>
      <a href="ip-blacklist.html">🚫 IP Blacklist</a>
      <a href="logs.html">📋 Logs</a>
      <a href="backup.html">💾 Backup</a>
      <a href="settings.html">⚙️ Settings</a>
      <div class="sidebar-footer">
        <a href="../" style="color:#888">← Main Site</a>
        <a href="#" onclick="adminLogout()" style="color:#e94560">Logout</a>
      </div>
    </nav>
    <main class="main-content">
      <header class="page-header">
        <a href="builds.html" class="back-link">← Back to Builds</a>
        <h1>Build Detail</h1>
      </header>

      <div class="card" id="buildDetail">
        <p class="text-muted">Loading...</p>
      </div>

      <div class="card">
        <h2>Build Logs</h2>
        <pre id="buildLogs" class="log-viewer">No logs available</pre>
      </div>

      <div class="card">
        <h2>Actions</h2>
        <div class="btn-group">
          <button onclick="rebuildBuild()" class="btn-sm">🔄 Rebuild</button>
          <button onclick="deleteBuild()" class="btn-sm danger">🗑 Delete</button>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>loadBuildDetail();</script>
</body>
</html>
